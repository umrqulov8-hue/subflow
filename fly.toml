app = 'subflow-backend'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 40

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

# fly.toml app configuration file generated for subflow-backend on 2026-06-20T12:27:07+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'subflow-backend'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 40

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
